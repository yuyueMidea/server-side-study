<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>电商前端 · Go+SQLite API</title>
  <style>
    /* === Light theme inspired by Bootstrap (no HTML/JS changes) === */
    :root{
      --body-bg:#f8f9fa; --panel-bg:#ffffff; --panel-2:#f8f9fa; --text:#212529; --muted:#6c757d;
      --primary:#0d6efd; --primary-hover:#0b5ed7; --secondary:#6c757d; --info:#0dcaf0;
      --success:#198754; --warning:#ffc107; --danger:#dc3545; --border:#dee2e6; --shadow:0 4px 12px rgba(33,37,41,.08);
    }
    *{box-sizing:border-box; padding: 0;}
    html,body{height:100%}
    body{margin:0;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Noto Sans CJK","Microsoft YaHei",sans-serif;background:var(--body-bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--border)}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    h1{font-size:20px;margin:0 0 8px 0;letter-spacing:.2px}
    h2{font-size:16px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    input,select,button,textarea{background:#fff;border:1px solid var(--border);color:var(--text);padding:4px;border-radius:8px;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 .2rem rgba(13,110,253,.25)}
    button{cursor:pointer;background:#fff}
    button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    button.primary:hover{background:var(--primary-hover)}
    button.ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
    button.ghost:hover{background:#f1f3f5}
    button.warn{background:var(--warning);border-color:#e0b500;color:#212529}
    button.warn:hover{filter:brightness(.97)}
    button.danger{background:var(--danger);border-color:#bb2d3b;color:#fff}
    button.danger:hover{filter:brightness(.97)}
    small.muted,.muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:260px 1fr;gap:16px}
    nav{background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;padding:12px;position:sticky;top:76px;height:calc(100vh - 106px);overflow:auto;box-shadow:var(--shadow)}
    nav .section-title{padding:8px 10px;font-weight:600;color:#495057;margin-top:8px}
    nav button{display:block;width:100%;text-align:left;margin:6px 0;padding:10px;border-radius:10px;border:1px solid var(--border);background:#fff}
    nav button.active{background:#e7f1ff;border-color:#b6d4fe;color:#084298}
    main{min-height:75vh}
    .panel{background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .table{width:100%;border-collapse:separate;border-spacing:0}
    .table th,.table td{border-bottom:1px solid var(--border);padding:10px 8px;text-align:left}
    .table thead th{position:sticky;top:0;background:#f8f9fa;z-index:1}
    .table tbody tr:nth-child(even){background:#fcfcfd}
    .scroll-x{overflow:auto}
    .scroll-y{overflow:auto}
    .stack{display:flex;flex-direction:column;gap:8px}
    .chip{display:inline-flex;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:#495057;background:#f8f9fa}
    .stat{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;box-shadow:var(--shadow)}
    .stat .num{font-size:18px;font-weight:700}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
    .right{margin-left:auto}
    .notice{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:999}
    .toast{background:#fff;border:1px solid var(--border);padding:10px 12px;border-radius:10px;box-shadow:var(--shadow)}
    .badge{font-size:12px;padding:2px 6px;border-radius:6px;border:1px solid #b6d4fe;color:#084298;background:#e7f1ff}
    .status-paid{color:var(--success);font-weight:600}
    .status-created{color:#0d6efd}
    .status-refunded{color:#b07900}
    .status-cancelled{color:var(--danger)}
    .code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;color:#6f42c1}
    .flex{display:flex;gap:12px;align-items:center}
    dialog{border:1px solid var(--border);background:#fff;color:var(--text);border-radius:12px;padding:0;box-shadow:var(--shadow)}
    dialog header{padding:12px;border-bottom:1px solid var(--border);background:#f8f9fa}
    dialog .body{padding:12px}
    dialog footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:#f8f9fa}
    .kbd{border:1px solid var(--border);padding:2px 6px;border-radius:6px;background:#f8f9fa}
    .hint{font-size:12px;color:#6c757d}
    .section{display:none}
    .section.active{display:block}
    .pilltabs{display:flex;gap:8px;margin:8px 0}
    .pilltabs button{border-radius:999px;padding:6px 10px}
    .inline{display:inline-flex;gap:8px;align-items:center}
    .w-120{width:120px}
    .w-80{width:80px}
    .mt8{margin-top:8px}
  </style>
</head>
<body>
<header>
  <div class="wrap row">
    <h1>电商管理前端</h1>
    <div class="right row">
      <label>API 地址</label>
      <input id="apiBase" class="w-120" placeholder="http://localhost:8080"/>
      <button id="saveBase" class="ghost" type="button">保存</button>
      <button id="btnHealth" class="ghost" type="button">健康检查</button>
    </div>
  </div>
</header>

<div class="wrap grid">
  <nav>
    <div class="section-title">模块</div>
    <button data-target="sec-customers" class="navBtn active" type="button">客户</button>
    <button data-target="sec-products" class="navBtn" type="button">商品</button>
    <button data-target="sec-orders" class="navBtn" type="button">订单</button>
    <button data-target="sec-analytics" class="navBtn" type="button">分析</button>
  </nav>

  <main>
    <!-- Customers -->
    <section id="sec-customers" class="section active panel">
      <div class="toolbar">
        <input id="custSearch" placeholder="按姓名/邮箱搜索">
        <button id="custSearchBtn" class="ghost" type="button">搜索</button>
        <button id="custCreateBtn" class="primary" type="button">新建客户</button>
      </div>
      <div class="scroll-x">
        <table class="table">
          <thead><tr><th>ID</th><th>姓名</th><th>邮箱</th><th>注册</th><th>操作</th></tr></thead>
          <tbody id="custTbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Products -->
    <section id="sec-products" class="section panel">
      <div class="toolbar">
        <button id="prodCreateBtn" class="primary" type="button">新建商品</button>
      </div>
      <div class="scroll-x">
        <table class="table">
          <thead><tr><th>ID</th><th>名称</th><th>分类</th><th>售价(元)</th><th>成本(元)</th><th>操作</th></tr></thead>
          <tbody id="prodTbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Orders -->
    <section id="sec-orders" class="section panel">
      <div class="toolbar row">
        <input id="ordFilterStatus" placeholder="状态(created/paid/refunded/cancelled)">
        <input id="ordFilterCust" placeholder="客户ID">
        <input id="ordFilterFrom" type="date">
        <input id="ordFilterTo" type="date">
        <button id="ordSearchBtn" class="ghost" type="button">筛选</button>
        <span class="right"></span>
        <button id="ordCreateBtn" class="primary" type="button">创建订单</button>
      </div>
      <div class="scroll-x">
        <table class="table">
          <thead><tr><th>ID</th><th>客户ID</th><th>下单时间</th><th>状态</th><th>应付</th><th>已付</th><th>待付</th><th>操作</th></tr></thead>
          <tbody id="ordTbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Analytics -->
    <section id="sec-analytics" class="section panel">
      <div class="toolbar row">
        <input id="anaFrom" type="date"><input id="anaTo" type="date">
        <button id="anaBtn" class="ghost" type="button">查询 GMV</button>
      </div>
      <div class="scroll-x">
        <table class="table"><thead><tr><th>日期</th><th>GMV(元)</th></tr></thead><tbody id="anaTbody"></tbody></table>
      </div>
    </section>
  </main>
</div>

<!-- Customer dialog -->
<dialog id="custDlg">
  <header><b id="custDlgTitle">新建客户</b></header>
  <div class="body stack">
    <input id="custId" type="hidden">
    <label>姓名 <input id="custName"></label>
    <label>邮箱 <input id="custEmail"></label>
    <label>分群 <input id="custSeg"></label>
  </div>
  <footer>
    <button id="custCancel" class="ghost" type="button">取消</button>
    <button id="custSave" class="primary" type="button">保存</button>
  </footer>
</dialog>

<!-- Product dialog -->
<dialog id="prodDlg">
  <header><b id="prodDlgTitle">新建商品</b></header>
  <div class="body stack">
    <input id="prodId" type="hidden">
    <label>名称 <input id="prodName"></label>
    <label>分类 <input id="prodCat"></label>
    <label>售价(元) <input id="prodPrice" type="number" step="0.01"></label>
    <label>成本(元) <input id="prodCost" type="number" step="0.01"></label>
  </div>
  <footer>
    <button id="prodCancel" class="ghost" type="button">取消</button>
    <button id="prodSave" class="primary" type="button">保存</button>
  </footer>
</dialog>

<!-- Order create dialog -->
<dialog id="ordDlg">
  <header><b>创建订单</b></header>
  <div class="body stack">
    <label>客户ID <input id="ordCustId" type="number"></label>
    <div id="ordItems" class="stack"></div>
    <button id="addItemBtn" class="ghost" type="button">+ 添加明细</button>
    <div class="stack">
      <b>首付款(可选)</b>
      <label>金额(元) <input id="payAmount" type="number" step="0.01"></label>
      <label>方式 <input id="payMethod" placeholder="card/paypal/cash"></label>
    </div>
  </div>
  <footer>
    <button id="ordCancel" class="ghost" type="button">取消</button>
    <button id="ordSave" class="primary" type="button">创建</button>
  </footer>
</dialog>

<!-- Payment dialog -->
<dialog id="payDlg">
  <header><b>追加付款</b></header>
  <div class="body stack">
    <input id="payOrderId" type="hidden">
    <label>金额(元) <input id="payAddAmount" type="number" step="0.01"></label>
    <label>方式 <input id="payAddMethod" placeholder="card/paypal/cash"></label>
  </div>
  <footer>
    <button id="payCancel" class="ghost" type="button">取消</button>
    <button id="paySave" class="primary" type="button">追加</button>
  </footer>
</dialog>

<div class="notice" id="notice"></div>

<script>
(function(){
  // ------------ Utils ------------
  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));
  const toast = (msg) => {
    const n = document.createElement('div');
    n.className='toast'; n.textContent=msg; $('#notice').appendChild(n);
    setTimeout(()=>{ n.remove(); }, 2600);
  };
  const getBase = () => localStorage.getItem('apiBase') || 'http://localhost:8080';
  const setBase = v => localStorage.setItem('apiBase', v);
  const yuanToCents = v => Math.round(parseFloat(v||0)*100);
  const centsToYuan = v => (v/100).toFixed(2);
  const j = async (method, path, body) => {
    const res = await fetch(getBase()+path, { method, headers: { 'Content-Type':'application/json' }, body: body?JSON.stringify(body):undefined });
    let data; try { data = await res.json(); } catch(_) { data = null; }
    if(!res.ok){ throw new Error((data&&data.error)||res.statusText); }
    return data;
  };

  // ------------ Nav ------------
  function bindNav(){
    $$('.navBtn').forEach(btn=>btn.addEventListener('click', e=>{
      $$('.navBtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const t = btn.dataset.target;
      $$('.section').forEach(s=>s.classList.remove('active'));
      $('#'+t).classList.add('active');
      if(t==='sec-customers') loadCustomers();
      if(t==='sec-products') loadProducts();
      if(t==='sec-orders') loadOrders();
      if(t==='sec-analytics') loadGMV();
    }));
  }

  // ------------ Header controls ------------
  function bindHeader(){
    $('#apiBase').value = getBase();
    $('#saveBase').addEventListener('click', ()=>{ setBase($('#apiBase').value.trim()); toast('API 地址已保存'); });
    $('#btnHealth').addEventListener('click', async ()=>{
      try{ const r = await j('GET','/health'); toast('健康检查 OK '+(r.time||'')); }
      catch(e){ toast('健康检查失败: '+e.message); }
    });
  }

  // ------------ Customers ------------
  async function loadCustomers(){
    const q = $('#custSearch').value.trim();
    const data = await j('GET', '/customers/?page=1&page_size=50'+(q?('&search='+encodeURIComponent(q)):'') );
    const tb = $('#custTbody'); tb.innerHTML='';
    (data.data||[]).forEach(c=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${c.customer_id}</td><td>${c.name}</td><td>${c.email||''}</td><td>${c.signup_date}</td>
      <td class="inline">
        <button type="button" class="ghost act-cust-edit" data-id="${c.customer_id}">编辑</button>
        <button type="button" class="ghost act-cust-sum" data-id="${c.customer_id}">概览</button>
        <button type="button" class="danger act-cust-del" data-id="${c.customer_id}">删除</button>
      </td>`;
      tb.appendChild(tr);
    });
  }
  function bindCustomerUI(){
    $('#custSearchBtn').addEventListener('click', ()=>loadCustomers());
    $('#custCreateBtn').addEventListener('click', ()=>{ $('#custDlgTitle').textContent='新建客户'; $('#custId').value=''; $('#custName').value=''; $('#custEmail').value=''; $('#custSeg').value=''; $('#custDlg').showModal(); });
    $('#custCancel').addEventListener('click', ()=>$('#custDlg').close());
    $('#custSave').addEventListener('click', async ()=>{
      try{
        const id = $('#custId').value.trim();
        const body = { name: $('#custName').value.trim(), email: valOrNull($('#custEmail').value), segment: valOrNull($('#custSeg').value) };
        if(!body.name){ toast('姓名必填'); return; }
        if(id){ await j('PUT', `/customers/${id}`, body); toast('已更新'); }
        else{ await j('POST','/customers/', body); toast('已创建'); }
        $('#custDlg').close(); loadCustomers();
      }catch(e){ toast('保存失败: '+e.message); }
    });
    // table actions via delegation
    $('#custTbody').addEventListener('click', async (e)=>{
      const t = e.target; if(!(t instanceof HTMLElement)) return;
      const id = t.dataset.id; if(!id) return;
      if(t.classList.contains('act-cust-edit')){
        // load
        try{ const c = await j('GET', `/customers/${id}`); $('#custDlgTitle').textContent='编辑客户'; $('#custId').value=c.customer_id; $('#custName').value=c.name||''; $('#custEmail').value=c.email||''; $('#custSeg').value=c.segment||''; $('#custDlg').showModal(); }
        catch(e){ toast('读取失败: '+e.message); }
      } else if(t.classList.contains('act-cust-del')){
        if(confirm('确定删除该客户及其关联订单吗？')){ try{ await j('DELETE', `/customers/${id}`); toast('已删除'); loadCustomers(); }catch(e){ toast('删除失败: '+e.message); } }
      } else if(t.classList.contains('act-cust-sum')){
        try{ const s = await j('GET', `/customers/${id}/summary`); toast(`订单数 ${s.orders}，累计GMV ¥${centsToYuan(s.gmv_cents)}`); }
        catch(e){ toast('概览失败: '+e.message); }
      }
    });
  }

  // ------------ Products ------------
  async function loadProducts(){
    const data = await j('GET','/products/?page=1&page_size=200');
    const tb = $('#prodTbody'); tb.innerHTML='';
    (data.data||[]).forEach(p=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${p.product_id}</td><td>${p.product_name}</td><td>${p.category||''}</td>
        <td>${centsToYuan(p.price_cents)}</td><td>${centsToYuan(p.cost_cents)}</td>
        <td class="inline">
          <button type="button" class="ghost act-prod-edit" data-id="${p.product_id}">编辑</button>
          <button type="button" class="danger act-prod-del" data-id="${p.product_id}">删除</button>
        </td>`;
      tb.appendChild(tr);
    });
  }
  function bindProductUI(){
    $('#prodCreateBtn').addEventListener('click', ()=>{ $('#prodDlgTitle').textContent='新建商品'; $('#prodId').value=''; $('#prodName').value=''; $('#prodCat').value=''; $('#prodPrice').value=''; $('#prodCost').value=''; $('#prodDlg').showModal(); });
    $('#prodCancel').addEventListener('click', ()=>$('#prodDlg').close());
    $('#prodSave').addEventListener('click', async ()=>{
      try{
        const id = $('#prodId').value.trim();
        const body = { product_name: $('#prodName').value.trim(), category: $('#prodCat').value.trim(), price_cents: yuanToCents($('#prodPrice').value), cost_cents: yuanToCents($('#prodCost').value) };
        if(!body.product_name){ toast('名称必填'); return; }
        if(id){ await j('PUT', `/products/${id}`, body); toast('已更新'); }
        else{ await j('POST','/products/', body); toast('已创建'); }
        $('#prodDlg').close(); loadProducts();
      }catch(e){ toast('保存失败: '+e.message); }
    });
    $('#prodTbody').addEventListener('click', async (e)=>{
      const t = e.target; if(!(t instanceof HTMLElement)) return; const id=t.dataset.id; if(!id) return;
      if(t.classList.contains('act-prod-edit')){
        try{ const p = await j('GET', `/products/${id}`); $('#prodDlgTitle').textContent='编辑商品'; $('#prodId').value=p.product_id; $('#prodName').value=p.product_name||''; $('#prodCat').value=p.category||''; $('#prodPrice').value=centsToYuan(p.price_cents); $('#prodCost').value=centsToYuan(p.cost_cents); $('#prodDlg').showModal(); }
        catch(e){ toast('读取失败: '+e.message); }
      } else if(t.classList.contains('act-prod-del')){
        if(confirm('确定删除该商品？')){ try{ await j('DELETE', `/products/${id}`); toast('已删除'); loadProducts(); }catch(e){ toast('删除失败: '+e.message); } }
      }
    });
  }

  // ------------ Orders ------------
  async function loadOrders(){
    const qs = [];
    const s = $('#ordFilterStatus').value.trim(); if(s) qs.push('status='+encodeURIComponent(s));
    const c = $('#ordFilterCust').value.trim(); if(c) qs.push('customer_id='+encodeURIComponent(c));
    const f = $('#ordFilterFrom').value; if(f) qs.push('from='+encodeURIComponent(f));
    const t = $('#ordFilterTo').value; if(t) qs.push('to='+encodeURIComponent(t));
    const url = '/orders/?page=1&page_size=50'+(qs.length?('&'+qs.join('&')):'');
    const data = await j('GET', url);
    const tb = $('#ordTbody'); tb.innerHTML='';
    (data.data||[]).forEach(o=>{
      const tr = document.createElement('tr');
      const stClass = 'status-'+o.status;
      tr.innerHTML = `<td>${o.order_id}</td><td>${o.customer_id}</td><td>${o.order_ts}</td>
        <td class="${stClass}">${o.status}</td>
        <td>¥${centsToYuan(o.items_total_cents||o.items_total||0)}</td>
        <td>¥${centsToYuan(o.paid_total_cents||o.paid_total||0)}</td>
        <td>¥${centsToYuan(o.outstanding_cents||o.outstanding||0)}</td>
        <td class="inline">
          <button type="button" class="ghost act-ord-view" data-id="${o.order_id}">详情</button>
          <button type="button" class="ghost act-ord-pay" data-id="${o.order_id}">追加付款</button>
          <button type="button" class="ghost act-ord-status" data-id="${o.order_id}" data-status="paid">设为已付</button>
          <button type="button" class="ghost act-ord-status" data-id="${o.order_id}" data-status="cancelled">取消</button>
          <button type="button" class="ghost act-ord-status" data-id="${o.order_id}" data-status="refunded">退款</button>
        </td>`;
      tb.appendChild(tr);
    });
  }
  function bindOrderUI(){
    $('#ordSearchBtn').addEventListener('click', ()=>loadOrders());
    $('#ordCreateBtn').addEventListener('click', ()=>{ resetOrderDlg(); $('#ordDlg').showModal(); });
    $('#ordCancel').addEventListener('click', ()=>$('#ordDlg').close());
    $('#addItemBtn').addEventListener('click', ()=>addOrderItemRow());
    $('#ordSave').addEventListener('click', async ()=>{
      try{
        const cust = parseInt($('#ordCustId').value,10);
        if(!cust){ toast('客户ID必填'); return; }
        const items = $$('#ordItems .order-item').map(row=>({
          product_id: parseInt(row.querySelector('.it-prod').value,10),
          qty: parseInt(row.querySelector('.it-qty').value,10),
          price_cents_at_sale: row.querySelector('.it-price').value ? yuanToCents(row.querySelector('.it-price').value) : undefined
        })).filter(it=>it.product_id && it.qty>0);
        if(items.length===0){ toast('至少添加一个明细'); return; }
        const payments = [];
        const pamt = $('#payAmount').value; const pm = $('#payMethod').value.trim();
        if(pamt){ payments.push({ paid_amount_cents: yuanToCents(pamt), method: pm }); }
        const body = { customer_id: cust, items, payments };
        const o = await j('POST','/orders/', body);
        toast('订单已创建 #'+o.order_id);
        $('#ordDlg').close(); loadOrders();
      }catch(e){ toast('创建失败: '+e.message); }
    });
    // table actions
    $('#ordTbody').addEventListener('click', async (e)=>{
      const t = e.target; if(!(t instanceof HTMLElement)) return; const id=t.dataset.id; if(!id) return;
      if(t.classList.contains('act-ord-view')){
        try{ const o = await j('GET', `/orders/${id}`); alert(renderOrderDetail(o)); }
        catch(e){ toast('读取失败: '+e.message); }
      } else if(t.classList.contains('act-ord-pay')){
        $('#payOrderId').value = id; $('#payAddAmount').value=''; $('#payAddMethod').value=''; $('#payDlg').showModal();
      } else if(t.classList.contains('act-ord-status')){
        try{ await j('PUT', `/orders/${id}/status`, { status: t.dataset.status }); toast('状态已更新'); loadOrders(); }
        catch(e){ toast('更新失败: '+e.message); }
      }
    });
    // payment dialog
    $('#payCancel').addEventListener('click', ()=>$('#payDlg').close());
    $('#paySave').addEventListener('click', async ()=>{
      try{
        const id = $('#payOrderId').value; const amt = $('#payAddAmount').value; const m = $('#payAddMethod').value.trim();
        await j('POST', `/orders/${id}/payments`, { paid_amount_cents: yuanToCents(amt), method: m });
        $('#payDlg').close(); toast('已追加付款'); loadOrders();
      }catch(e){ toast('追加失败: '+e.message); }
    });
  }
  function renderOrderDetail(o){
    const lines = [];
    lines.push(`订单#${o.order_id} - 客户${o.customer_id} - ${o.status}`);
    lines.push(`应付¥${centsToYuan(o.items_total_cents||0)} 已付¥${centsToYuan(o.paid_total_cents||0)} 待付¥${centsToYuan((o.items_total_cents||0)-(o.paid_total_cents||0))}`);
    lines.push('明细:');
    (o.items||[]).forEach(it=>lines.push(`  - 商品${it.product_id} x${it.qty} 价¥${centsToYuan(it.price_cents_at_sale)}`));
    lines.push('付款:');
    (o.payments||[]).forEach(p=>lines.push(`  - ¥${centsToYuan(p.paid_amount_cents)} via ${p.method} @ ${p.paid_ts}`));
    return lines.join('\n');
  }
  function resetOrderDlg(){
    $('#ordCustId').value=''; $('#ordItems').innerHTML=''; $('#payAmount').value=''; $('#payMethod').value=''; addOrderItemRow();
  }
  function addOrderItemRow(){
    const row = document.createElement('div'); row.className='order-item row';
    row.innerHTML = `
      <input class="it-prod w-80" placeholder="商品ID"/> 
      <input class="it-qty w-80" type="number" min="1" placeholder="数量"/> 
      <input class="it-price w-120" type="number" step="0.01" placeholder="成交价(元,可空)"> 
      <button type="button" class="ghost it-remove">移除</button>`;
    row.querySelector('.it-remove').addEventListener('click', ()=>row.remove());
    $('#ordItems').appendChild(row);
  }

  // ------------ Analytics ------------
  async function loadGMV(){
    const f = $('#anaFrom').value; const t = $('#anaTo').value;
    const qs = []; if(f) qs.push('from='+encodeURIComponent(f)); if(t) qs.push('to='+encodeURIComponent(t));
    const data = await j('GET', '/analytics/daily-gmv'+(qs.length?('?'+qs.join('&')):''));
    const tb = $('#anaTbody'); tb.innerHTML='';
    (data.data||[]).forEach(r=>{
      const tr=document.createElement('tr'); tr.innerHTML = `<td>${r.date}</td><td>${centsToYuan(r.gmv_cents)}</td>`; tb.appendChild(tr);
    });
  }

  // ------------ helpers ------------
  const valOrNull = v => { v = (v||'').trim(); return v? v : null; };

  // init
  document.addEventListener('DOMContentLoaded', () => {
    bindNav(); bindHeader(); bindCustomerUI(); bindProductUI(); bindOrderUI();
    // default load customers
    loadCustomers();
  });
})();
</script>
</body>
</html>
